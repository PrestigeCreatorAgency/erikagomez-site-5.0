<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--accent:#E63946;--black:#050505;--white:#FFFFFF;--surface:#0F0F0F;--surface2:#1A1A1A;--gray:#666;--border:rgba(255,255,255,0.08);}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* ── PAGE WRAPPER ── */
.page{max-width:520px;margin:0 auto;padding:20px 16px;}

/* ── HERO CARD ── */
.hero-card{
  position:relative;
  width:100%;
  aspect-ratio:3/4;
  border-radius:28px;
  overflow:hidden;
  background:var(--surface2);
  margin-bottom:16px;
}

.hero-photo{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
}

/* Gradient overlay — bottom heavy */
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    180deg,
    rgba(5,5,5,0) 30%,
    rgba(5,5,5,0.4) 60%,
    rgba(5,5,5,0.85) 85%,
    rgba(5,5,5,0.95) 100%
  );
}

/* Grain */
.hero-grain{
  position:absolute;
  inset:0;
  opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events:none;
}

/* Content overlaid on photo */
.hero-inner{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:24px 22px;
}

/* Name */
.hero-name{
  font-family:'Playfair Display',serif;
  font-weight:900;
  font-size:clamp(36px,8vw,52px);
  color:var(--white);
  line-height:1;
  margin-bottom:14px;
  letter-spacing:-0.5px;
}

/* Follower badge — full width bar like Angie's */
.follower-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(10,10,10,0.65);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:40px;
  padding:10px 18px;
  margin-bottom:16px;
}

.follower-bar-left{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:10px;
  color:rgba(255,255,255,0.5);
  letter-spacing:2px;
  text-transform:uppercase;
  font-weight:500;
}

.live-dot{
  width:8px;height:8px;
  border-radius:50%;
  background:var(--accent);
  flex-shrink:0;
  animation:livepulse 2.2s ease-in-out infinite;
}

@keyframes livepulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:0.4;transform:scale(0.75);}
}

.follower-count{
  font-size:13px;
  font-weight:500;
  color:var(--white);
  letter-spacing:1px;
  text-transform:uppercase;
}

/* Social icons row inside card */
.social-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.social-icon{
  width:52px;height:52px;
  border-radius:14px;
  background:rgba(15,15,15,0.7);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.12);
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;
  transition:background 0.2s,transform 0.2s;
  flex-shrink:0;
}

.social-icon:hover,.social-icon:active{
  background:rgba(30,30,30,0.85);
  transform:translateY(-2px);
}

.social-icon svg{width:22px;height:22px;fill:var(--white);}

/* ── CTA BUTTON ── */
.cta-btn{
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  padding:18px 24px;
  background:var(--accent);
  border-radius:18px;
  font-size:15px;
  font-weight:500;
  color:#fff;
  text-decoration:none;
  position:relative;
  overflow:hidden;
  transition:filter 0.2s,transform 0.15s;
  margin-bottom:12px;
}

.cta-btn::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.13) 0%,transparent 100%);
  pointer-events:none;
}

.cta-btn:hover{filter:brightness(1.1);}
.cta-btn:active{transform:scale(0.98);}
.cta-arrow{margin-left:auto;font-size:18px;}

/* ── SECTIONS ── */
.sec{padding:40px 0;}

.eyebrow{
  display:flex;align-items:center;gap:10px;
  margin-bottom:20px;
}
.eyebrow-line{width:24px;height:1.5px;background:var(--accent);flex-shrink:0;}
.eyebrow-text{font-size:9px;color:var(--accent);letter-spacing:4px;text-transform:uppercase;font-weight:500;}

/* ── CONTENT CARDS ── */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.card{
  position:relative;border-radius:16px;overflow:hidden;
  text-decoration:none;display:block;background:var(--surface2);
  transition:transform 0.25s;
}
.card:active{transform:scale(0.97);}
.card.wide{grid-column:1/-1;aspect-ratio:16/9;}
.card.tall{aspect-ratio:2/3;}
.card img{width:100%;height:100%;object-fit:cover;display:block;}
.card-overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(to top,rgba(5,5,5,0.75) 0%,rgba(5,5,5,0.1) 100%);
}
.card-lock{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.card-lbl{font-size:11px;color:rgba(255,255,255,0.7);text-align:center;padding:0 16px;line-height:1.45;}
.card-badge{
  position:absolute;top:11px;left:11px;
  font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;background:var(--accent);color:#fff;
}
.card-badge.gold{background:linear-gradient(135deg,#8B6914,#C9A96E);color:#1a1000;}
.card-badge.blue{background:#229ED9;color:#fff;}

/* ── GALLERY ── */
.gallery{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;border-radius:16px;overflow:hidden;}
.gcell{overflow:hidden;background:var(--surface2);}
.gcell.wide{grid-column:1/-1;aspect-ratio:3/2;}
.gcell.sq{aspect-ratio:4/5;}
.gcell img{width:100%;height:100%;object-fit:contain;background:#111;display:block;transition:transform 0.4s;}
.gcell:hover img{transform:scale(1.05);}
.gph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;opacity:0.15;}

/* ── FOOTER ── */
.site-footer{text-align:center;padding:24px 20px 48px;font-size:9px;color:rgba(255,255,255,0.1);letter-spacing:2px;text-transform:uppercase;}

/* ── REVEAL ── */
.reveal{opacity:0;transform:translateY(20px);transition:opacity 0.7s ease,transform 0.7s ease;}
.reveal.in{opacity:1;transform:translateY(0);}

/* ── DESKTOP ── */
@media(min-width:768px){
  .page{max-width:600px;padding:32px 24px;}
  .hero-card{aspect-ratio:4/5;border-radius:36px;}
  .hero-name{font-size:clamp(48px,6vw,72px);}
  .social-icon{width:58px;height:58px;border-radius:16px;}
  .social-icon svg{width:26px;height:26px;}
  .cta-btn{font-size:16px;padding:20px 28px;border-radius:20px;}
  .cards{gap:12px;}
  .card{border-radius:20px;}
  .gallery{gap:6px;border-radius:20px;}
  .sec{padding:56px 0;}


}

@media(min-width:1200px){
  .page{max-width:680px;}
  .hero-name{font-size:72px;}
}

/* ── AGE VERIFICATION MODAL ── */
.age-modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:99999;

.age-modal{

.age-btn-cancel:hover{color:rgba(255,255,255,0.7);}
</style>

  if (C.analytics_url && C.analytics_id) {
    var s = document.createElement('script');
    s.defer = true; s.src = C.analytics_url;
    s.setAttribute('data-website-id', C.analytics_id);
    document.head.appendChild(s);
  }


  // Age verification modal
  var pendingUrl = '';
  function openAgeModal(url) {
    pendingUrl = url;
    document.getElementById('ageConfirm').href = url;
    document.getElementById('ageModal').classList.add('open');
  }
  function closeAgeModal() {
    document.getElementById('ageModal').classList.remove('open');
    pendingUrl = '';
  }
  // Close on background click
  document.getElementById('ageModal').addEventListener('click', function(e) {
    if (e.target === this) closeAgeModal();
  });
  // Cancel button
  document.getElementById('ageCancelBtn').addEventListener('click', function() {
    closeAgeModal();
  });
  // Cancel button
  document.getElementById('ageCancelBtn').addEventListener('click', function() {
    closeAgeModal();
  });
  // Intercept OF and Telegram links
  var protectedLinks = ['J_cta','J_card_vip','J_card_free','J_card_tg'];
  protectedLinks.forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var originalHref = el.href;
    el.addEventListener('click', function(e) {
      e.preventDefault();
      openAgeModal(originalHref);
    });
  });

  // Scroll reveal
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(function(el) { obs.observe(el); });
};
</script>
